<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Requin Open 🦈</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦈</text></svg>"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a1628}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    input[type=number]{-moz-appearance:textfield}
    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
    select option{background:#0f2137}
    input::placeholder{color:#334155}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes wave{from{transform:scaleX(1) translateY(0)}to{transform:scaleX(1.05) translateY(-20px)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastIn{from{opacity:0;transform:translateY(-16px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes toastOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.9)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── FIREBASE ────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDcMhSpvKRrgIRNB_1I-iCN3OLFWPKI8K0",
  authDomain: "requinopen.firebaseapp.com",
  databaseURL: "https://requinopen-default-rtdb.firebaseio.com",
  projectId: "requinopen",
  storageBucket: "requinopen.firebasestorage.app",
  messagingSenderId: "151123063839",
  appId: "1:151123063839:web:88ab62907cb9e3beb7512a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ROOT = "requin-open-v1";

function subscribeState(cb) {
  const ref = db.ref(ROOT);
  ref.on("value", snap => cb(snap.val()||{}));
  return () => ref.off();
}
async function fbSet(path, val)  { await db.ref(`${ROOT}/${path}`).set(val); }
async function fbPush(path, val) { await db.ref(`${ROOT}/${path}`).push(val); }
async function fbRemove(path)    { await db.ref(`${ROOT}/${path}`).remove(); }

// ─── COURSE DATA ─────────────────────────────────────────────────────────────
const HOLES = [
  {hole:1, par:5,yards:472},{hole:2, par:3,yards:171},{hole:3, par:5,yards:519},
  {hole:4, par:4,yards:330},{hole:5, par:5,yards:501},{hole:6, par:3,yards:162},
  {hole:7, par:4,yards:326},{hole:8, par:3,yards:178},{hole:9, par:4,yards:350},
  {hole:10,par:4,yards:365},{hole:11,par:4,yards:419},{hole:12,par:3,yards:155},
  {hole:13,par:4,yards:390},{hole:14,par:4,yards:364},{hole:15,par:5,yards:515},
  {hole:16,par:4,yards:460},{hole:17,par:4,yards:324},{hole:18,par:4,yards:385},
];
const PAR3S    = HOLES.filter(h=>h.par===3);
const TOTAL_PAR = HOLES.reduce((s,h)=>s+h.par,0);
const NP_PRIZE  = 50;
const TRASH_EMOJIS = ["🦈","🏌️","⛳","🔥","💀","👀","🎯","💪"];
const SHARK_EMOJIS = ["🏆","🌊","⚡","🎖️","👑","🦈"];

function genId() { return Math.random().toString(36).slice(2,9); }

function scoreDiff(score, par) { return Number(score) - par; }
function scoreLabel(score, par) {
  const d = scoreDiff(score,par);
  if (d<=-2) return {label:"Eagle 🦅",color:"#f59e0b"};
  if (d===-1) return {label:"Birdie 🐦",color:"#22c55e"};
  if (d===0)  return {label:"Par",      color:"#94a3b8"};
  if (d===1)  return {label:"Bogey",    color:"#f97316"};
  if (d===2)  return {label:"Double 😬",color:"#ef4444"};
  return {label:`+${d} 💀`,color:"#dc2626"};
}
function fmtScore(d) { return d===0?"E":d>0?`+${d}`:`${d}`; }

function getStats(scores) {
  let total=0,played=0,eagles=0,birdies=0,pars=0,bogeys=0,doubles=0,pires=0;
  (scores||[]).forEach((s,i)=>{
    if(s===""||s==null||s===undefined) return;
    const d=Number(s)-HOLES[i].par; total+=d; played++;
    if(d<=-2)eagles++; else if(d===-1)birdies++; else if(d===0)pars++;
    else if(d===1)bogeys++; else if(d===2)doubles++; else pires++;
  });
  return{diff:total,played,eagles,birdies,pars,bogeys,doubles,pires};
}

// ─── COLOURS ─────────────────────────────────────────────────────────────────
function theme(light) {
  return light ? {
    bg:"#f0f7f0", tx:"#1a3a1a", tx2:"#4a7a4a", tx3:"#2d6a2d",
    card:"#ffffff", cardB:"#c0dcc0", cardH:"rgba(45,106,45,0.08)", cardHB:"#a0c8a0",
    inp:"#ffffff", inpB:"#a0c8a0", acc:"#2d6a2d",
    hdr:"rgba(255,255,255,0.97)", hdrB:"#c8dfc0",
    nav:"rgba(255,255,255,0.97)", navB:"#c8dfc0",
    btn:"linear-gradient(135deg,#2d6a2d,#1a4a1a)",
    sep:"#d0e8d0"
  } : {
    bg:"#0a1628", tx:"#f0f9ff", tx2:"#475569", tx3:"#38bdf8",
    card:"rgba(255,255,255,0.03)", cardB:"rgba(255,255,255,0.06)",
    cardH:"rgba(56,189,248,0.08)", cardHB:"rgba(56,189,248,0.3)",
    inp:"rgba(255,255,255,0.05)", inpB:"rgba(56,189,248,0.3)", acc:"#38bdf8",
    hdr:"rgba(10,22,40,0.95)", hdrB:"rgba(56,189,248,0.15)",
    nav:"rgba(8,18,34,0.97)", navB:"rgba(56,189,248,0.15)",
    btn:"linear-gradient(135deg,#0ea5e9,#0284c7)",
    sep:"rgba(255,255,255,0.05)"
  };
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
const TOASTS = {
  eagle: {bg:"rgba(245,158,11,0.95)", border:"#f59e0b", icon:"🦅", label:"EAGLE!"},
  birdie:{bg:"rgba(34,197,94,0.95)",  border:"#22c55e", icon:"🐦", label:"BIRDIE!"},
  bogey: {bg:"rgba(249,115,22,0.9)",  border:"#f97316", icon:"😬", label:"BOGEY"},
  double:{bg:"rgba(239,68,68,0.9)",   border:"#ef4444", icon:"💀", label:"DOUBLE!"},
  pire:  {bg:"rgba(220,38,38,0.9)",   border:"#dc2626", icon:"🔥", label:"AU SECOURS!"},
};
function ToastContainer({toasts,onDismiss}) {
  if(!toasts.length) return null;
  return (<>
    <div onClick={()=>toasts.forEach(t=>onDismiss(t.id))} style={{position:"fixed",inset:0,zIndex:998,pointerEvents:"all"}}/>
    <div style={{position:"fixed",top:80,left:0,right:0,zIndex:999,display:"flex",flexDirection:"column",alignItems:"center",gap:8,pointerEvents:"none"}}>
      {toasts.map(t=>(
        <div key={t.id} onClick={e=>{e.stopPropagation();onDismiss(t.id);}}
          style={{pointerEvents:"all",background:TOASTS[t.type]?.bg,border:`2px solid ${TOASTS[t.type]?.border}`,borderRadius:16,padding:"12px 20px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 8px 32px rgba(0,0,0,0.5)",animation:t.fading?"toastOut 0.4s ease forwards":"toastIn 0.3s ease",maxWidth:340,cursor:"pointer"}}>
          <span style={{fontSize:28}}>{TOASTS[t.type]?.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,color:"#fff",letterSpacing:2}}>{TOASTS[t.type]?.label} — Trou #{t.hole}</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.85)",marginTop:1}}>{t.teamName} · {t.score} coups</div>
          </div>
          <span style={{fontSize:16,color:"rgba(255,255,255,0.5)"}}>✕</span>
        </div>
      ))}
    </div>
  </>);
}

// ─── SPINNER / ENTRY ─────────────────────────────────────────────────────────
function Spinner() {
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0a1628"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:64,animation:"spin 1s linear infinite",display:"inline-block"}}>🦈</div>
        <p style={{color:"#38bdf8",fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,letterSpacing:4,marginTop:16}}>CHARGEMENT...</p>
      </div>
    </div>
  );
}

function EntryScreen({onEnter, teams}) {
  const [name,setName]=useState(""), [shake,setShake]=useState(false);
  const [step,setStep]=useState("name"), [newTeam,setNewTeam]=useState("");
  function next() {
    if(!name.trim()){setShake(true);setTimeout(()=>setShake(false),500);return;}
    setStep("team");
  }
  return (
    <div style={{minHeight:"100vh",background:"#0a1628",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Barlow Condensed',sans-serif",overflow:"hidden",position:"relative",padding:"0 24px"}}>
      <div style={{position:"absolute",inset:0,overflow:"hidden",opacity:0.07}}>
        {[...Array(6)].map((_,i)=><div key={i} style={{position:"absolute",bottom:`${i*12}%`,left:"-20%",right:"-20%",height:200,borderRadius:"50%",border:"2px solid #38bdf8",animation:`wave ${3+i*0.5}s ease-in-out infinite alternate`,animationDelay:`${i*0.3}s`}}/>)}
      </div>
      <div style={{position:"relative",zIndex:1,textAlign:"center",maxWidth:480,width:"100%"}}>
        <div style={{marginBottom:8}}><span style={{fontSize:80,filter:"drop-shadow(0 0 30px #38bdf8)"}}>🦈</span></div>
        <h1 style={{fontSize:"clamp(52px,12vw,96px)",fontWeight:900,letterSpacing:2,margin:0,lineHeight:0.9,background:"linear-gradient(135deg,#38bdf8 0%,#fff 50%,#7dd3fc 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",textTransform:"uppercase"}}>REQUIN<br/>OPEN</h1>
        <p style={{color:"#475569",fontSize:13,letterSpacing:6,textTransform:"uppercase",margin:"12px 0 32px"}}>⛳ Lac Mégantic Golf Club ⛳</p>

        {step==="name"&&(
          <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:28,border:"1px solid rgba(56,189,248,0.2)"}}>
            <p style={{color:"#94a3b8",fontSize:13,letterSpacing:3,textTransform:"uppercase",margin:"0 0 14px"}}>Ton nom, champion</p>
            <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&next()} placeholder="Ex: Tiger Woods"
              style={{width:"100%",padding:"14px 18px",fontSize:20,fontWeight:700,background:"rgba(255,255,255,0.06)",border:"2px solid rgba(56,189,248,0.3)",borderRadius:10,color:"#fff",outline:"none",boxSizing:"border-box",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1,animation:shake?"shake 0.4s ease":"none"}}
              onFocus={e=>e.target.style.borderColor="#38bdf8"} onBlur={e=>e.target.style.borderColor="rgba(56,189,248,0.3)"}/>
            <button onClick={next} style={{width:"100%",marginTop:14,padding:"15px",fontSize:19,fontWeight:900,background:"linear-gradient(135deg,#0ea5e9,#0284c7)",border:"none",borderRadius:10,color:"#fff",cursor:"pointer",letterSpacing:3,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>CONTINUER →</button>
          </div>
        )}

        {step==="team"&&(
          <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:28,border:"1px solid rgba(56,189,248,0.2)",textAlign:"left"}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:22,fontWeight:900,color:"#38bdf8"}}>Salut {name}! 🦈</div>
              <div style={{fontSize:13,color:"#64748b",marginTop:4}}>Rejoins ou crée une équipe</div>
            </div>
            {teams.length>0&&(
              <div style={{marginBottom:16}}>
                <p style={{color:"#94a3b8",fontSize:11,letterSpacing:2,margin:"0 0 10px"}}>ÉQUIPES EXISTANTES</p>
                {teams.map(t=>(
                  <button key={t.id} onClick={()=>onEnter(name.trim(),"join",t)}
                    style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",marginBottom:8,background:"rgba(56,189,248,0.06)",border:"1px solid rgba(56,189,248,0.2)",borderRadius:10,color:"#fff",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textAlign:"left"}}>
                    <div>
                      <div style={{fontSize:16,fontWeight:700}}>🦈 {t.name}</div>
                      <div style={{fontSize:11,color:"#475569",marginTop:2}}>{(t.members||[]).join(", ")||"Aucun membre"}</div>
                    </div>
                    <span style={{fontSize:13,color:"#38bdf8",letterSpacing:1}}>JOINDRE →</span>
                  </button>
                ))}
              </div>
            )}
            <div style={{display:"flex",alignItems:"center",gap:10,margin:"16px 0"}}>
              <div style={{flex:1,height:1,background:"rgba(255,255,255,0.08)"}}/>
              <span style={{color:"#334155",fontSize:12,letterSpacing:2}}>OU</span>
              <div style={{flex:1,height:1,background:"rgba(255,255,255,0.08)"}}/>
            </div>
            <p style={{color:"#94a3b8",fontSize:11,letterSpacing:2,margin:"0 0 8px"}}>CRÉER UNE ÉQUIPE</p>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              <input value={newTeam} onChange={e=>setNewTeam(e.target.value)} onKeyDown={e=>e.key==="Enter"&&newTeam.trim()&&onEnter(name.trim(),"create",newTeam.trim())} placeholder="Nom de l'équipe..."
                style={{flex:1,padding:"11px 14px",fontSize:15,fontWeight:700,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(56,189,248,0.25)",borderRadius:8,color:"#fff",outline:"none",fontFamily:"'Barlow Condensed',sans-serif"}}/>
              <button onClick={()=>newTeam.trim()&&onEnter(name.trim(),"create",newTeam.trim())} style={{padding:"11px 16px",background:"linear-gradient(135deg,#0ea5e9,#0284c7)",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:14,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif"}}>CRÉER</button>
            </div>
            <button onClick={()=>onEnter(name.trim(),null,null)} style={{width:"100%",padding:"10px",background:"none",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#475569",cursor:"pointer",fontSize:12,letterSpacing:2,fontFamily:"'Barlow Condensed',sans-serif"}}>CONTINUER SANS ÉQUIPE</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── STAT PILL ───────────────────────────────────────────────────────────────
function StatPill({emoji,count,color,label}) {
  if(!count) return null;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
      <div style={{background:`${color}22`,border:`1px solid ${color}55`,borderRadius:8,padding:"3px 10px",display:"flex",alignItems:"center",gap:4}}>
        <span style={{fontSize:13}}>{emoji}</span>
        <span style={{color,fontWeight:900,fontSize:14,fontFamily:"'Barlow Condensed',sans-serif"}}>{count}</span>
      </div>
      <span style={{fontSize:9,color:"#475569",letterSpacing:1}}>{label}</span>
    </div>
  );
}

// ─── HOLE-BY-HOLE SCORECARD ───────────────────────────────────────────────────
function HoleScorecard({team, onUpdateScore, onUpdateNP, nearestPin, light, teams}) {
  const T = theme(light);
  const scores = team.scores||Array(18).fill("");

  // Find current hole: first unsaved, or last hole if all done
  const firstEmpty = scores.findIndex(s=>s===""||s==null||s===undefined);
  const [holeIdx, setHoleIdx] = useState(firstEmpty===-1?17:firstEmpty);
  const [picked, setPicked] = useState(null); // selected score before confirm
  const [pickMode, setPickMode] = useState(false); // custom score input
  const [customVal, setCustomVal] = useState("");

  const hole = HOLES[holeIdx];
  const isPar3 = hole.par===3;
  const currentScore = scores[holeIdx];
  const hasScore = currentScore!==""&&currentScore!=null&&currentScore!==undefined;
  const stats = getStats(scores);

  // The furthest hole the user can navigate to = first empty + 1 (can't skip ahead)
  const maxReachable = firstEmpty===-1?17:Math.min(firstEmpty, 17);

  // Score buttons: par-2 to par+3, minimum 1
  const scoreOptions = [];
  for(let s=Math.max(1,hole.par-2); s<=hole.par+3; s++) scoreOptions.push(s);

  function handleConfirm() {
    const val = picked!==null?picked:(hasScore?Number(currentScore):null);
    if(val===null) return;
    const next=[...scores]; next[holeIdx]=val;
    onUpdateScore(next);
    setPicked(null); setPickMode(false); setCustomVal("");
    // Advance to next empty hole
    const nextEmpty = next.findIndex((s,i)=>i>holeIdx&&(s===""||s==null||s===undefined));
    if(nextEmpty!==-1) setHoleIdx(nextEmpty);
    else if(holeIdx<17) setHoleIdx(holeIdx+1);
  }

  function handleCustomConfirm() {
    const v=parseInt(customVal);
    if(isNaN(v)||v<1) return;
    setPicked(v); setPickMode(false); setCustomVal("");
  }

  const displayScore = picked!==null?picked:(hasScore?Number(currentScore):null);
  const lbl = displayScore!==null?scoreLabel(displayScore,hole.par):null;

  // Nearest pin for this par3
  const npEntry = nearestPin?.[hole.hole];

  return (
    <div style={{animation:"slideUp 0.25s ease"}}>

      {/* Progress bar */}
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{color:T.tx2,fontSize:11,letterSpacing:2}}>PROGRESSION</span>
          <span style={{color:T.tx,fontSize:12,fontWeight:700}}>{stats.played}/18 trous · {stats.played>0?fmtScore(stats.diff):"—"}</span>
        </div>
        <div style={{height:4,background:T.cardB,borderRadius:2,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${(stats.played/18)*100}%`,background:T.acc,borderRadius:2,transition:"width 0.3s"}}/>
        </div>
        {/* Mini dots */}
        <div style={{display:"flex",gap:3,marginTop:6,flexWrap:"wrap"}}>
          {HOLES.map((h,i)=>{
            const s=scores[i];
            const done=s!==""&&s!=null&&s!==undefined;
            const active=i===holeIdx;
            const reachable=i<=maxReachable;
            const d=done?scoreDiff(Number(s),h.par):null;
            const dotColor=done?(d<=-2?"#f59e0b":d===-1?"#22c55e":d===0?T.tx2:d===1?"#f97316":"#ef4444"):(active?T.acc:T.cardB);
            return (
              <div key={i} onClick={()=>reachable&&setHoleIdx(i)}
                style={{width:active?20:14,height:active?20:14,borderRadius:"50%",background:dotColor,cursor:reachable?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",border:active?`2px solid ${T.acc}`:"none",flexShrink:0}}>
                {active&&<span style={{fontSize:8,fontWeight:900,color:done?T.bg:"#fff"}}>{h.hole}</span>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Hole card */}
      <div style={{background:T.card,border:`1px solid ${isPar3?T.acc:T.cardB}`,borderRadius:20,overflow:"hidden",marginBottom:12}}>

        {/* Hole header */}
        <div style={{background:isPar3?(light?"rgba(45,106,45,0.15)":"rgba(56,189,248,0.1)"):(light?"rgba(45,106,45,0.08)":"rgba(255,255,255,0.04)"),padding:"16px 20px",borderBottom:`1px solid ${T.cardB}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:38,fontWeight:900,color:T.tx,lineHeight:1}}>
                TROU #{hole.hole}
              </div>
              <div style={{display:"flex",gap:12,marginTop:4,alignItems:"center"}}>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:T.acc}}>Par {hole.par}</span>
                <span style={{fontSize:13,color:T.tx2}}>{hole.yards} yards</span>
                {isPar3&&<span style={{fontSize:13,color:T.acc,fontWeight:700}}>📍 Nearest Pin</span>}
              </div>
            </div>
            {/* Nav arrows */}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>holeIdx>0&&setHoleIdx(holeIdx-1)} disabled={holeIdx===0}
                style={{width:40,height:40,borderRadius:"50%",background:holeIdx>0?T.cardH:"transparent",border:`1px solid ${T.cardB}`,color:holeIdx>0?T.tx:T.cardB,fontSize:18,cursor:holeIdx>0?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
              <button onClick={()=>holeIdx<maxReachable&&setHoleIdx(holeIdx+1)} disabled={holeIdx>=maxReachable}
                style={{width:40,height:40,borderRadius:"50%",background:holeIdx<maxReachable?T.cardH:"transparent",border:`1px solid ${T.cardB}`,color:holeIdx<maxReachable?T.tx:T.cardB,fontSize:18,cursor:holeIdx<maxReachable?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center"}}>→</button>
            </div>
          </div>
        </div>

        {/* Score picker */}
        <div style={{padding:"20px"}}>
          {pickMode ? (
            <div>

function ScoreRecap({scores,light}) {
  const T=theme(light);
  const played=scores.filter(s=>s!==""&&s!=null&&s!==undefined);
  if(!played.length) return null;
  return (
    <div style={{background:T.card,border:`1px solid ${T.cardB}`,borderRadius:14,padding:"14px 16px",marginTop:8}}>
      <p style={{color:T.tx2,fontSize:11,letterSpacing:2,marginBottom:10}}>RÉCAP DU PARCOURS</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(9,1fr)",gap:3,marginBottom:6}}>
        {HOLES.slice(0,9).map((h,i)=>{
          const s=scores[i]; const done=s!==""&&s!=null&&s!==undefined;
          const lbl=done?scoreLabel(Number(s),h.par):null;
          return (
            <div key={i} style={{textAlign:"center"}}>
              <div style={{fontSize:9,color:T.tx2,marginBottom:2}}>{h.hole}</div>
              <div style={{fontSize:13,fontWeight:900,color:done?lbl.color:T.cardB,fontFamily:"'Barlow Condensed',sans-serif"}}>{done?s:"·"}</div>
            </div>
          );
        })}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(9,1fr)",gap:3}}>
        {HOLES.slice(9).map((h,i)=>{
          const s=scores[i+9]; const done=s!==""&&s!=null&&s!==undefined;
          const lbl=done?scoreLabel(Number(s),h.par):null;
          return (
            <div key={i} style={{textAlign:"center"}}>
              <div style={{fontSize:9,color:T.tx2,marginBottom:2}}>{h.hole}</div>
              <div style={{fontSize:13,fontWeight:900,color:done?lbl.color:T.cardB,fontFamily:"'Barlow Condensed',sans-serif"}}>{done?s:"·"}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── LEADERBOARD ─────────────────────────────────────────────────────────────
function Leaderboard({teams, nearestPin, light}) {
  const T=theme(light);
  const ranked=[...teams].map(t=>({...t,...getStats(t.scores||[])}))
    .sort((a,b)=>{
      if(!a.played&&!b.played) return 0;
      if(!a.played) return 1; if(!b.played) return -1;
      return a.diff-b.diff;
    });

  // Nearest pin summary
  const npWinnings={};
  PAR3S.forEach(h=>{
    const e=nearestPin?.[h.hole];
    if(e?.teamName){const k=e.winner||e.teamName;npWinnings[k]=(npWinnings[k]||0)+NP_PRIZE;}
  });

  return (
    <div>
      {/* Team standings */}
      {!ranked.length&&(
        <div style={{textAlign:"center",padding:"40px 20px",color:T.tx2}}>
          <div style={{fontSize:48}}>⛳</div>
          <p style={{fontSize:14,letterSpacing:2,marginTop:12}}>AUCUNE ÉQUIPE POUR L'INSTANT</p>
        </div>
      )}
      {ranked.map((team,idx)=>{
        const isLeading=idx===0&&team.played>0;
        const cardBg=isLeading?T.cardH:T.card;
        const cardBdr=isLeading?T.cardHB:T.cardB;
        return (
          <div key={team.id} style={{padding:"14px 16px",marginBottom:10,background:cardBg,border:`1px solid ${cardBdr}`,borderRadius:14}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:team.played>0?10:0}}>
              <div style={{fontSize:26,minWidth:32,textAlign:"center"}}>{idx===0&&team.played>0?"🏆":`${idx+1}`}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:900,fontSize:18,color:T.tx,letterSpacing:1}}>{SHARK_EMOJIS[Math.min(idx,5)]} {team.name}</div>
                <div style={{fontSize:11,color:T.tx2,marginTop:1}}>{(team.members||[]).join(", ")||"—"} · {team.played}/18 trous</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:30,fontWeight:900,color:team.diff<0?"#22c55e":team.diff>0?"#f97316":T.tx2,fontFamily:"'Barlow Condensed',sans-serif"}}>
                  {team.played>0?fmtScore(team.diff):"—"}
                </div>
              </div>
            </div>
            {team.played>0&&(
              <div style={{display:"flex",gap:8,flexWrap:"wrap",paddingTop:8,borderTop:`1px solid ${T.sep}`}}>
                <StatPill emoji="🦅" count={team.eagles}  color="#f59e0b" label="EAGLE"/>
                <StatPill emoji="🐦" count={team.birdies} color="#22c55e" label="BIRDIE"/>
                <StatPill emoji="🟰" count={team.pars}    color={T.tx2}   label="PAR"/>
                <StatPill emoji="😬" count={team.bogeys}  color="#f97316" label="BOGEY"/>
                <StatPill emoji="💀" count={team.doubles} color="#ef4444" label="DOUBLE"/>
                {team.pires>0&&<StatPill emoji="🔥" count={team.pires} color="#dc2626" label="PIRE"/>}
              </div>
            )}
          </div>
        );
      })}

      {/* Nearest pin table */}
      <div style={{marginTop:24,background:T.card,border:`1px solid ${T.cardB}`,borderRadius:14,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.cardB}`,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:18}}>📍</span>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:900,color:T.acc,letterSpacing:2}}>NEAREST PIN</span>
          <span style={{fontSize:12,color:T.tx2,marginLeft:"auto"}}>{NP_PRIZE}$ / trou</span>
        </div>
        {PAR3S.map(h=>{
          const e=nearestPin?.[h.hole];
          return (
            <div key={h.hole} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:`1px solid ${T.sep}`}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:T.acc,minWidth:60}}>Trou {h.hole}</span>
                <span style={{fontSize:11,color:T.tx2}}>{h.yards}y</span>
              </div>
              {e?.teamName?(
                <div style={{textAlign:"right"}}>
                  <div style={{fontWeight:700,color:T.tx,fontSize:14}}>🏆 {e.winner||e.teamName}</div>
                  {e.winner&&<div style={{fontSize:11,color:T.tx2}}>{e.teamName}</div>}
                </div>
              ):(
                <span style={{fontSize:12,color:T.tx2,fontStyle:"italic"}}>À venir...</span>
              )}
            </div>
          );
        })}
        {Object.keys(npWinnings).length>0&&(
          <div style={{padding:"12px 16px",borderTop:`1px solid ${T.cardB}`,background:light?"rgba(45,106,45,0.05)":"rgba(251,191,36,0.04)"}}>
            <p style={{color:T.acc,fontSize:11,letterSpacing:2,marginBottom:8}}>💰 GAINS</p>
            {Object.entries(npWinnings).sort((a,b)=>b[1]-a[1]).map(([p,a])=>(
              <div key={p} style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{color:T.tx,fontSize:14}}>🏌️ {p}</span>
                <span style={{color:"#fbbf24",fontWeight:900,fontSize:16,fontFamily:"'Barlow Condensed',sans-serif"}}>{a}$</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [rawState,setRawState]         = useState(null);
  const [userName,setUserName]         = useState(()=>localStorage.getItem("rq-username")||"");
  const [view,setView]                 = useState("board");
  const [activeTeamId,setActiveTeamId] = useState(null);
  const [newTeamName,setNewTeamName]   = useState("");
  const [chatInput,setChatInput]       = useState("");
  const [connected,setConnected]       = useState(false);
  const [toasts,setToasts]             = useState([]);
  const [light,setLight]               = useState(false);
  const chatEndRef = useRef(null);
  const prevScores = useRef({});

  function addToast(type,hole,score,teamName) {
    const id=genId();
    setToasts(t=>[...t,{id,type,hole,score,teamName,fading:false}]);
    setTimeout(()=>setToasts(t=>t.map(x=>x.id===id?{...x,fading:true}:x)),14500);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),15000);
  }
  function dismissToast(id) {
    setToasts(t=>t.map(x=>x.id===id?{...x,fading:true}:x));
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),400);
  }

  useEffect(()=>{
    const unsub=subscribeState(data=>{
      const teams=data.teams
        ?Object.entries(data.teams).map(([id,t])=>({...t,id,
            members:t.members?(Array.isArray(t.members)?t.members:Object.values(t.members)):[],
            scores:t.scores?(Array.isArray(t.scores)?t.scores:Object.values(t.scores)):Array(18).fill(""),
          }))
        :[];
      const messages=data.messages
        ?Object.entries(data.messages).map(([id,m])=>({...m,id})).sort((a,b)=>a.ts-b.ts)
        :[];
      const users=data.users?Object.entries(data.users).map(([name,u])=>({name,...u})):[];

      // Toasts
      teams.forEach(team=>{
        const prev=prevScores.current[team.id];
        if(prev){
          team.scores.forEach((sc,i)=>{
            if(sc===""||sc==null) return;
            if(prev[i]===sc) return;
            const d=Number(sc)-HOLES[i].par;
            let type=null;
            if(d<=-2)type="eagle"; else if(d===-1)type="birdie";
            else if(d===1)type="bogey"; else if(d===2)type="double"; else if(d>=3)type="pire";
            if(type) addToast(type,i+1,sc,team.name);
          });
        }
        prevScores.current[team.id]=[...team.scores];
      });

      // Force logout if deleted
      const cur=localStorage.getItem("rq-username");
      if(cur&&data.users?.[cur]?.deleted){
        localStorage.removeItem("rq-username");
        fbRemove(`users/${cur}`);
        setUserName("");
        setRawState({teams,messages,nearestPin:data.nearestPin||{},users});
        setConnected(true);
        return;
      }

      setRawState({teams,messages,nearestPin:data.nearestPin||{},users});
      setConnected(true);
    });
    return unsub;
  },[]);

  useEffect(()=>{
    if(!userName) return;
    db.ref(`${ROOT}/users/${userName}`).get().then(snap=>{
      if(!snap.exists()) fbSet(`users/${userName}`,{joinedAt:Date.now(),deleted:false});
    });
  },[userName]);

  useEffect(()=>{
    if(chatEndRef.current) chatEndRef.current.scrollIntoView({behavior:"smooth"});
  },[rawState?.messages?.length]);

  async function registerAndEnter(name,action,payload) {
    const snap=await db.ref(`${ROOT}/users/${name}`).get();
    if(snap.exists()&&!snap.val().deleted){
      alert(`Le nom "${name}" est déjà utilisé! Choisis un autre nom.`); return;
    }
    await fbSet(`users/${name}`,{joinedAt:Date.now(),deleted:false});
    localStorage.setItem("rq-username",name);
    setUserName(name);
    if(action==="join"&&payload){
      const team=payload;
      if(!(team.members||[]).includes(name))
        await fbSet(`teams/${team.id}/members`,[...(team.members||[]),name]);
      setActiveTeamId(team.id); setView("scorecard");
    } else if(action==="create"&&payload){
      const id=genId();
      await fbSet(`teams/${id}`,{name:payload,creator:name,members:[name],scores:Array(18).fill(""),createdAt:Date.now()});
      setActiveTeamId(id); setView("scorecard");
    }
  }

  if(!connected) return <Spinner/>;
  if(!userName)  return <EntryScreen onEnter={registerAndEnter} teams={rawState?.teams||[]}/>;

  const {teams=[],messages=[],nearestPin={},users=[]}=rawState||{};
  const myTeam  = teams.find(t=>(t.members||[]).includes(userName));
  const isAdmin = userName==="Nick";
  const T = theme(light);

  async function createTeam() {
    if(!newTeamName.trim()) return;
    if(myTeam) return alert("Tu es déjà dans une équipe!");
    const id=genId();
    await fbSet(`teams/${id}`,{name:newTeamName.trim(),creator:userName,members:[userName],scores:Array(18).fill(""),createdAt:Date.now()});
    setNewTeamName(""); setActiveTeamId(id); setView("scorecard");
  }
  async function joinTeam(teamId) {
    if(myTeam) return alert("Tu es déjà dans une équipe!");
    const team=teams.find(t=>t.id===teamId);
    await fbSet(`teams/${teamId}/members`,[...(team.members||[]),userName]);
    setActiveTeamId(teamId); setView("scorecard");
  }
  async function leaveTeam() {
    if(!myTeam) return;
    if(myTeam.creator===userName){
      if(!window.confirm("Tu es le créateur. L'équipe sera supprimée!")) return;
      await fbRemove(`teams/${myTeam.id}`);
    } else {
      await fbSet(`teams/${myTeam.id}/members`,myTeam.members.filter(m=>m!==userName));
    }
    setActiveTeamId(null); setView("board");
  }
  async function updateScore(scores) { if(myTeam) await fbSet(`teams/${myTeam.id}/scores`,scores); }
  async function updateNP(holeNum,winner,teamId,teamName) {
    if(winner===null&&teamId===null) { await fbRemove(`nearestPin/${holeNum}`); return; }
    await fbSet(`nearestPin/${holeNum}`,{winner,teamId,teamName});
  }
  async function sendMessage() {
    if(!chatInput.trim()) return;
    await fbPush("messages",{author:userName,team:myTeam?.name||"Spectateur",text:chatInput.trim(),ts:Date.now()});
    setChatInput("");
  }
  async function deleteMember(team,member) {
    if(team.creator===member) await fbRemove(`teams/${team.id}`);
    else await fbSet(`teams/${team.id}/members`,(team.members||[]).filter(m=>m!==member));
    await fbSet(`users/${member}/deleted`,true);
  }
  async function resetGame() {
    await fbRemove("nearestPin"); await fbRemove("messages");
    for(const t of teams) await fbSet(`teams/${t.id}/scores`,Array(18).fill(""));
  }
  async function resetAll() {
    await db.ref(ROOT).remove();
    localStorage.removeItem("rq-username"); setUserName("");
  }

  const navItems=[
    {id:"board",    label:"Tableau", emoji:"🏆"},
    {id:"teams",    label:"Équipes", emoji:"⛳"},
    {id:"scorecard",label:myTeam?"Ma carte":"Scores",emoji:"📋"},
    {id:"chat",     label:"Trash",   emoji:"🦈"},
    ...(isAdmin?[{id:"admin",label:"Admin",emoji:"🔐"}]:[]),
  ];

  // Active team for scorecard view
  const viewTeam = teams.find(t=>t.id===activeTeamId) || myTeam;

  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.tx,fontFamily:"'Barlow',sans-serif",paddingBottom:80,transition:"background 0.3s"}}>
      <ToastContainer toasts={toasts} onDismiss={dismissToast}/>

      {/* HEADER */}
      <div style={{background:T.hdr,backdropFilter:"blur(12px)",borderBottom:`1px solid ${T.hdrB}`,padding:"12px 16px",position:"sticky",top:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:24}}>🦈</span>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,letterSpacing:2,lineHeight:1,color:T.acc}}>REQUIN OPEN</div>
            <div style={{fontSize:10,color:T.tx2,letterSpacing:2}}>LAC MÉGANTIC · PAR {TOTAL_PAR}</div>
          </div>
          <div style={{background:light?"rgba(45,106,45,0.1)":"rgba(56,189,248,0.12)",border:`1px solid ${T.cardB}`,borderRadius:6,padding:"2px 8px",marginLeft:4}}>
            <span style={{fontSize:11,fontWeight:900,color:T.acc,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>v2.0</span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,color:myTeam?"#22c55e":T.tx2,fontWeight:600}}>{myTeam?`🟢 ${myTeam.name}`:`👤 ${userName}`}</div>
            <div style={{fontSize:10,color:"#22c55e",letterSpacing:1}}>● LIVE</div>
          </div>
          <button onClick={()=>setLight(l=>!l)}
            style={{width:34,height:34,borderRadius:"50%",background:T.cardH,border:`1px solid ${T.cardB}`,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {light?"🌙":"☀️"}
          </button>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:600,margin:"0 auto",padding:"20px 16px",animation:"fadeIn 0.3s ease"}}>

        {view==="admin"&&isAdmin&&(
          <AdminPanel teams={teams} users={users} onResetGame={resetGame} onResetAll={resetAll} onDeleteMember={deleteMember} light={light}/>
        )}

        {view==="board"&&(
          <div>
            <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,letterSpacing:2,color:T.tx,marginBottom:4}}>CLASSEMENT 🏆</h2>
            <p style={{color:T.tx2,fontSize:12,letterSpacing:2,marginBottom:20}}>Lac Mégantic · Par {TOTAL_PAR} · Temps réel</p>
            <Leaderboard teams={teams} nearestPin={nearestPin} light={light}/>
          </div>
        )}

        {view==="teams"&&(
          <div>
            <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,letterSpacing:2,color:T.tx,marginBottom:20}}>ÉQUIPES ⛳</h2>
            {!myTeam&&(
              <div style={{background:T.cardH,border:`1px solid ${T.cardHB}`,borderRadius:14,padding:18,marginBottom:20}}>
                <p style={{color:T.acc,fontSize:12,letterSpacing:2,marginBottom:10}}>CRÉER UNE ÉQUIPE</p>
                <div style={{display:"flex",gap:8}}>
                  <input value={newTeamName} onChange={e=>setNewTeamName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createTeam()} placeholder="Nom de ton équipe..."
                    style={{flex:1,padding:"12px 14px",fontSize:16,fontWeight:700,background:T.inp,border:`1px solid ${T.inpB}`,borderRadius:8,color:T.tx,outline:"none",fontFamily:"'Barlow Condensed',sans-serif"}}/>
                  <button onClick={createTeam} style={{padding:"12px 18px",background:T.btn,border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:16,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif"}}>CRÉER</button>
                </div>
              </div>
            )}
            {myTeam&&(
              <div style={{background:T.cardH,border:`1px solid ${T.cardHB}`,borderRadius:14,padding:18,marginBottom:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <p style={{color:T.acc,fontSize:12,letterSpacing:2,marginBottom:4}}>TON ÉQUIPE</p>
                    <p style={{color:T.tx,fontSize:20,fontWeight:700}}>🦈 {myTeam.name}</p>
                  </div>
                  <button onClick={leaveTeam} style={{padding:"8px 14px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:8,color:"#dc2626",cursor:"pointer",fontSize:12,letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"}}>QUITTER</button>
                </div>
              </div>
            )}
            {!teams.length&&(
              <div style={{textAlign:"center",padding:"40px 0",color:T.tx2}}>
                <div style={{fontSize:48,marginBottom:12}}>🏌️</div>
                <p style={{letterSpacing:2,fontSize:13}}>Aucune équipe.<br/>Sois le premier!</p>
              </div>
            )}
            {teams.map(team=>{
              const isMine=team.id===myTeam?.id;
              const stats=getStats(team.scores||[]);
              return (
                <div key={team.id} style={{background:isMine?T.cardH:T.card,border:`1px solid ${isMine?T.cardHB:T.cardB}`,borderRadius:14,padding:16,marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div>
                      <div style={{fontSize:18,fontWeight:700,color:T.tx}}>🦈 {team.name}</div>
                      <div style={{fontSize:11,color:T.tx2,marginTop:2}}>Créé par {team.creator}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:22,fontWeight:900,color:stats.diff<0?"#22c55e":stats.diff>0?"#f97316":T.tx2}}>{stats.played>0?fmtScore(stats.diff):"—"}</div>
                      <div style={{fontSize:10,color:T.tx2}}>{stats.played}/18 trous</div>
                    </div>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                    {(team.members||[]).map(m=><span key={m} style={{padding:"3px 10px",background:T.cardH,borderRadius:20,fontSize:12,color:T.acc,border:`1px solid ${T.cardHB}`}}>{m}</span>)}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    {!myTeam&&<button onClick={()=>joinTeam(team.id)} style={{padding:"8px 16px",background:T.btn,border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>JOINDRE</button>}
                    <button onClick={()=>{setActiveTeamId(team.id);setView("scorecard");}} style={{padding:"8px 16px",background:"none",border:`1px solid ${T.cardB}`,borderRadius:8,color:T.tx2,cursor:"pointer",fontSize:13,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>VOIR SCORES</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {view==="scorecard"&&(
          <div>
            {!viewTeam?(
              <div style={{textAlign:"center",padding:"60px 0"}}>
                <div style={{fontSize:48}}>📋</div>
                <p style={{color:T.tx2,marginTop:16,letterSpacing:2,fontSize:13}}>JOINS UNE ÉQUIPE POUR SAISIR LES SCORES</p>
                <button onClick={()=>setView("teams")} style={{marginTop:16,padding:"12px 24px",background:T.btn,border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2}}>VOIR LES ÉQUIPES</button>
              </div>
            ):(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:16}}>
                  <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,color:T.tx}}>🦈 {viewTeam.name}</h2>
                  <span style={{fontSize:11,color:viewTeam.creator===userName?"#22c55e":T.tx2,letterSpacing:1}}>
                    {viewTeam.creator===userName?"✏️ CAPITAINE":"LECTURE SEULE"}
                  </span>
                </div>
                <HoleScorecard
                  team={viewTeam}
                  onUpdateScore={viewTeam.creator===userName?updateScore:()=>{}}
                  onUpdateNP={updateNP}
                  nearestPin={nearestPin}
                  light={light}
                  teams={teams}
                />
              </div>
            )}
          </div>
        )}

        {view==="chat"&&(
          <div>
            <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,letterSpacing:2,color:T.tx,marginBottom:4}}>TRASH TALK 🦈</h2>
            <p style={{color:T.tx2,fontSize:12,letterSpacing:2,marginBottom:20}}>Chippe les autres équipes ici · Live</p>
            <div style={{minHeight:300,maxHeight:480,overflowY:"auto",padding:"16px",background:T.card,borderRadius:14,marginBottom:16,border:`1px solid ${T.cardB}`}}>
              {!messages.length&&(
                <div style={{textAlign:"center",paddingTop:60,color:T.tx2}}>
                  <div style={{fontSize:40}}>🦈</div>
                  <p style={{marginTop:12,letterSpacing:2,fontSize:12}}>AUCUN TRASH TALK POUR L'INSTANT</p>
                </div>
              )}
              {messages.map(msg=><ChatBubble key={msg.id} msg={msg} isMe={msg.author===userName} light={light}/>)}
              <div ref={chatEndRef}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMessage()} placeholder="Chippe une équipe... 🦈"
                style={{flex:1,padding:"12px 16px",fontSize:15,background:T.inp,border:`1px solid ${T.inpB}`,borderRadius:24,color:T.tx,outline:"none",fontFamily:"'Barlow',sans-serif"}}/>
              <button onClick={sendMessage} style={{padding:"12px 18px",background:T.btn,border:"none",borderRadius:24,color:"#fff",cursor:"pointer",fontSize:18}}>🦈</button>
            </div>
          </div>
        )}
      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:T.nav,backdropFilter:"blur(16px)",borderTop:`1px solid ${T.navB}`,display:"flex",justifyContent:"space-around",padding:"10px 0 max(10px,env(safe-area-inset-bottom))"}}>
        {navItems.map(nav=>{
          const active=view===nav.id;
          return (
            <button key={nav.id} onClick={()=>setView(nav.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"4px 16px",color:active?T.acc:T.tx2,transition:"color 0.2s"}}>
              <span style={{fontSize:22}}>{nav.emoji}</span>
              <span style={{fontSize:10,fontWeight:700,letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>{nav.label}</span>
              {active&&<div style={{width:4,height:4,borderRadius:"50%",background:T.acc}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
