    body{background:#0a1628}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

    input::placeholder{color:#334155}

    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes modalIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}

async function fbSet(path,val){await db.ref(`${ROOT}/${path}`).set(val);}

// ─── COURSE ──────────────────────────────────────────────────────────────────
const HOLES=[
  {hole:1,par:5,yards:472},{hole:2,par:3,yards:171},{hole:3,par:5,yards:519},
  {hole:4,par:4,yards:330},{hole:5,par:5,yards:501},{hole:6,par:3,yards:162},
  {hole:7,par:4,yards:326},{hole:8,par:3,yards:178},{hole:9,par:4,yards:350},
  {hole:10,par:4,yards:365},{hole:11,par:4,yards:419},{hole:12,par:3,yards:155},
  {hole:13,par:4,yards:390},{hole:14,par:4,yards:364},{hole:15,par:5,yards:515},
  {hole:16,par:4,yards:460},{hole:17,par:4,yards:324},{hole:18,par:4,yards:385},
];
const PAR3S=HOLES.filter(h=>h.par===3);
const TOTAL_PAR=HOLES.reduce((s,h)=>s+h.par,0);
const NP_PRIZE=50;
const TRASH_EMOJIS=["🦈","🏌️","⛳","🔥","💀","👀","🎯","💪"];
function genId(){return Math.random().toString(36).slice(2,9);}
function fmtScore(d){return d===0?"E":d>0?`+${d}`:`${d}`;}
function getDiff(score,par){return Number(score)-par;}
function getStats(scores){
  let total=0,played=0,eagles=0,birdies=0,pars=0,bogeys=0,doubles=0,pires=0;
  (scores||[]).forEach((s,i)=>{
    if(s===""||s==null||s===undefined)return;
    const d=Number(s)-HOLES[i].par;total+=d;played++;
    if(d<=-2)eagles++;else if(d===-1)birdies++;else if(d===0)pars++;
    else if(d===1)bogeys++;else if(d===2)doubles++;else pires++;
  });
  return{diff:total,played,eagles,birdies,pars,bogeys,doubles,pires};
}
function getCurrentHoleIdx(scores){
  const i=(scores||[]).findIndex(s=>s===""||s==null||s===undefined);
  return i===-1?17:i;
}

// ─── THEME ───────────────────────────────────────────────────────────────────
function T(light){
  return light?{
    bg:"#f0f7f0",tx:"#1a3a1a",tx2:"#4a7a4a",

    hdr:"rgba(10,22,40,0.95)",hdrB:"rgba(56,189,248,0.15)",nav:"rgba(8,18,34,0.97)",navB:"rgba(56,189,248,0.15)",
    btn:"linear-gradient(135deg,#0ea5e9,#0284c7)",sep:"rgba(255,255,255,0.05)",scoreCard:"rgba(255,255,255,0.02)",
    fade:"rgba(10,22,40,0.95)"
  };
}

// ─── SCORE HELPERS ────────────────────────────────────────────────────────────
function scoreColor(d){
  if(d<=-2)return"#f59e0b";if(d===-1)return"#22c55e";if(d===0)return"#94a3b8";
  if(d===1)return"#f97316";return"#ef4444";
}
function scoreNameForDiff(d,score,par){
  if(par===3&&score===1)return"Hole in one!";
  if(d<=-3)return"Albatros";if(d===-2)return"Eagle";if(d===-1)return"Birdie";
  if(d===0)return"Par";if(d===1)return"Bogey";if(d===2)return"Double";if(d===3)return"Triple";
  return`+${d}`;
}

// ─── SCORE SYMBOL ─────────────────────────────────────────────────────────────
function ScoreSymbol({score,par,size=28,light}){
  if(score===""||score==null||score===undefined)return<span style={{color:light?"#c0d0c0":"#334155",fontSize:size*0.7,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>·</span>;
  const d=getDiff(score,par),n=Number(score),fs=size*0.55;
  const base={fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:fs,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1};
  const txColor=light?"#1a3a1a":"#e2e8f0";
  if(d<=-2)return(
    <span style={{position:"relative",display:"inline-flex",alignItems:"center",justifyContent:"center",width:size,height:size}}>
      {d<=-3&&<span style={{position:"absolute",width:size+6,height:size+6,borderRadius:"50%",border:`1.5px solid ${txColor}`}}/>}
      <span style={{width:size,height:size,borderRadius:"50%",background:txColor,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{...base,color:light?"#f0f7f0":"#0a1628"}}>{n}</span>
      </span>
    </span>
  );
  if(d===-1)return<span style={{width:size,height:size,borderRadius:"50%",border:`1.5px solid ${txColor}`,display:"inline-flex",alignItems:"center",justifyContent:"center"}}><span style={{...base,color:txColor}}>{n}</span></span>;
  if(d===0)return<span style={{...base,color:light?"#4a7a4a":"#94a3b8",width:size,height:size,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>{n}</span>;
  if(d===1)return<span style={{width:size,height:size,border:`1.5px solid ${txColor}`,display:"inline-flex",alignItems:"center",justifyContent:"center"}}><span style={{...base,color:txColor}}>{n}</span></span>;
  return(
    <span style={{position:"relative",display:"inline-flex",alignItems:"center",justifyContent:"center",width:size+6,height:size+6}}>
      <span style={{position:"absolute",width:size+6,height:size+6,border:`1.5px solid ${txColor}`}}/>
      <span style={{width:size,height:size,border:`1.5px solid ${txColor}`,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{...base,color:txColor}}>{n}</span>
      </span>
    </span>
  );
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
const TOASTS={
  eagle:{bg:"rgba(245,158,11,0.95)",border:"#f59e0b",icon:"🦅",label:"EAGLE!"},
  birdie:{bg:"rgba(34,197,94,0.95)",border:"#22c55e",icon:"🐦",label:"BIRDIE!"},
  bogey:{bg:"rgba(249,115,22,0.9)",border:"#f97316",icon:"😬",label:"BOGEY"},

  pire:{bg:"rgba(220,38,38,0.9)",border:"#dc2626",icon:"🔥",label:"AU SECOURS!"},

function ToastContainer({toasts,onDismiss}){
  if(!toasts.length)return null;
  return(<>
    <div onClick={()=>toasts.forEach(t=>onDismiss(t.id))} style={{position:"fixed",inset:0,zIndex:998,pointerEvents:"all"}}/>
    <div style={{position:"fixed",top:80,left:0,right:0,zIndex:999,display:"flex",flexDirection:"column",alignItems:"center",gap:8,pointerEvents:"none"}}>
      {toasts.map(t=>(
        <div key={t.id} onClick={e=>{e.stopPropagation();onDismiss(t.id);}}
          style={{pointerEvents:"all",background:TOASTS[t.type]?.bg,border:`2px solid ${TOASTS[t.type]?.border}`,borderRadius:16,padding:"12px 20px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 8px 32px rgba(0,0,0,0.5)",animation:t.fading?"toastOut 0.4s ease forwards":"toastIn 0.3s ease",maxWidth:340,cursor:"pointer"}}>
          <span style={{fontSize:28}}>{TOASTS[t.type]?.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,color:"#fff",letterSpacing:2}}>{TOASTS[t.type]?.label} — Trou {t.hole}</div>

          </div>
          <span style={{fontSize:16,color:"rgba(255,255,255,0.5)"}}>✕</span>
        </div>
      ))}
    </div>
  </>);
}

function EntryScreen({onEnter,teams}){

    <div style={{minHeight:"100vh",background:"#0a1628",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Barlow Condensed',sans-serif",overflow:"hidden",position:"relative",padding:"0 24px"}}>
      <div style={{position:"absolute",inset:0,overflow:"hidden",opacity:0.07}}>
        {[...Array(6)].map((_,i)=><div key={i} style={{position:"absolute",bottom:`${i*12}%`,left:"-20%",right:"-20%",height:200,borderRadius:"50%",border:"2px solid #38bdf8",animation:`wave ${3+i*0.5}s ease-in-out infinite alternate`,animationDelay:`${i*0.3}s`}}/>)}
      </div>
      <div style={{position:"relative",zIndex:1,textAlign:"center",maxWidth:480,width:"100%"}}>

        <p style={{color:"#475569",fontSize:13,letterSpacing:6,textTransform:"uppercase",margin:"12px 0 32px"}}>⛳ Lac Mégantic Golf Club ⛳</p>

          </div>

          <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:28,border:"1px solid rgba(56,189,248,0.2)",textAlign:"left"}}>

                    <div>
                      <div style={{fontSize:16,fontWeight:700}}>🦈 {t.name}</div>
                      <div style={{fontSize:11,color:"#475569",marginTop:2}}>{(t.members||[]).join(", ")||"Aucun membre"}</div>
                    </div>
                    <span style={{fontSize:13,color:"#38bdf8",letterSpacing:1}}>JOINDRE →</span>

// ─── STAT PILL ───────────────────────────────────────────────────────────────

// ─── SCORE ROULETTE ──────────────────────────────────────────────────────────
function ScoreRoulette({par,value,onChange,light,t,horizontal}){
  const ITEM_H=56, ITEM_W=100;
  const MIN=Math.max(1,par-2), MAX=par+3;
  const values=Array.from({length:MAX-MIN+1},(_,i)=>i+MIN);
  const scrollRef=useRef(null);
  const scrollTimer=useRef(null);

  useEffect(()=>{
    const el=scrollRef.current; if(!el) return;
    const initial=value!=null&&value>=MIN&&value<=MAX?value:par;
    const idx=values.indexOf(initial);
    if(idx<0) return;
    if(horizontal) el.scrollLeft=idx*ITEM_W;
    else el.scrollTop=idx*ITEM_H;
  },[par,horizontal]);

  function onScroll(){
    clearTimeout(scrollTimer.current);
    scrollTimer.current=setTimeout(()=>{
      const el=scrollRef.current; if(!el) return;
      if(horizontal){
        const idx=Math.round(el.scrollLeft/ITEM_W);
        const s=Math.max(0,Math.min(values.length-1,idx));
        el.scrollTo({left:s*ITEM_W,behavior:"smooth"});
        onChange(values[s]);
      } else {
        const idx=Math.round(el.scrollTop/ITEM_H);
        const s=Math.max(0,Math.min(values.length-1,idx));
        el.scrollTo({top:s*ITEM_H,behavior:"smooth"});
        onChange(values[s]);
      }
    },80);
  }

  const containerH=ITEM_H*3;

  if(horizontal) return(
    <div style={{position:"relative",marginBottom:14,borderRadius:14,overflow:"hidden",border:`1px solid ${t.cardB}`,height:ITEM_H+20}}>
      <div style={{position:"absolute",top:0,left:0,bottom:0,width:ITEM_W,background:`linear-gradient(to right,${t.fade},transparent)`,zIndex:2,pointerEvents:"none"}}/>
      <div style={{position:"absolute",top:0,right:0,bottom:0,width:ITEM_W,background:`linear-gradient(to left,${t.fade},transparent)`,zIndex:2,pointerEvents:"none"}}/>
      <div style={{position:"absolute",top:0,bottom:0,left:"50%",width:ITEM_W,transform:"translateX(-50%)",background:t.cardH,borderLeft:`1px solid ${t.cardB}`,borderRight:`1px solid ${t.cardB}`,zIndex:1,pointerEvents:"none"}}/>
      <div ref={scrollRef} onScroll={onScroll}
        style={{display:"flex",alignItems:"center",height:"100%",overflowX:"scroll",overflowY:"hidden",
          scrollSnapType:"x mandatory",msOverflowStyle:"none",scrollbarWidth:"none",
          paddingLeft:`calc(50% - ${ITEM_W/2}px)`,paddingRight:`calc(50% - ${ITEM_W/2}px)`}}>
        {values.map((v,i)=>{
          const isSel=v===value, d=v-par;
          const col=scoreColor(d);
          return(
            <div key={v} onClick={()=>{onChange(v);scrollRef.current?.scrollTo({left:i*ITEM_W,behavior:"smooth"});}}
              style={{minWidth:ITEM_W,height:"100%",scrollSnapAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,zIndex:3}}>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:isSel?44:26,fontWeight:900,color:isSel?col:light?"rgba(26,58,26,0.3)":"rgba(255,255,255,0.22)",lineHeight:1,transition:"font-size 0.15s,color 0.15s"}}>{v}</span>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,color:isSel?col:light?"rgba(26,58,26,0.2)":"rgba(255,255,255,0.18)",letterSpacing:1,marginTop:3,transition:"color 0.15s"}}>{scoreNameForDiff(d,v,par)}</span>
            </div>
          );
        })}
      </div>
    </div>

    </div>
  );
}

// ─── HOLE SCORECARD ──────────────────────────────────────────────────────────
function HoleScorecard({team,canEdit,onUpdateScore,onUpdateNP,nearestPin,light,teams,userName}){
  const t=T(light);
  const scores=team.scores||Array(18).fill("");
  const firstEmpty=getCurrentHoleIdx(scores);
  const [holeIdx,setHoleIdx]=useState(firstEmpty);
  const [picked,setPicked]=useState(null);
  const [pickMode,setPickMode]=useState(false);
  const [customVal,setCustomVal]=useState("");
  const [roulette,setRoulette]=useState(true);

  const hole=HOLES[holeIdx];
  const isPar3=hole.par===3;
  const currentScore=scores[holeIdx];
  const hasScore=currentScore!==""&&currentScore!=null&&currentScore!==undefined;
  const stats=getStats(scores);
  const maxReachable=Math.min(firstEmpty,17);
  const scoreOptions=[];
  for(let s=Math.max(1,hole.par-2);s<=hole.par+3;s++)scoreOptions.push(s);
  const displayScore=picked!==null?picked:(hasScore?Number(currentScore):null);
  const npEntry=nearestPin?.[hole.hole];
  const cumulDiff=scores.slice(0,holeIdx+1).reduce((acc,s,i)=>{
    if(s===""||s==null||s===undefined)return acc;
    return acc+(Number(s)-HOLES[i].par);
  },0);
  const holesCountedForCumul=scores.slice(0,holeIdx+1).filter(s=>s!==""&&s!=null&&s!==undefined).length;

  function handleConfirm(){
    if(!canEdit)return;
    const val=picked!==null?picked:(hasScore?Number(currentScore):null);
    if(val===null)return;
    const next=[...scores];next[holeIdx]=val;
    onUpdateScore(next);
    setPicked(null);setPickMode(false);setCustomVal("");
    const nextEmpty=next.findIndex((s,i)=>i>holeIdx&&(s===""||s==null||s===undefined));
    if(nextEmpty!==-1)setHoleIdx(nextEmpty);
    else if(holeIdx<17)setHoleIdx(holeIdx+1);
  }
  function handleCustomConfirm(){
    const v=parseInt(customVal);if(isNaN(v)||v<1)return;
    setPicked(v);setPickMode(false);setCustomVal("");
  }

  return(
    <div style={{animation:"slideUp 0.25s ease"}}>
      {/* Progress */}
      <div style={{marginBottom:10}}>
        <div style={{height:4,background:t.cardB,borderRadius:3,overflow:"hidden",marginBottom:6}}>
          <div style={{height:"100%",width:`${(stats.played/18)*100}%`,background:t.acc,borderRadius:3,transition:"width 0.4s"}}/>
        </div>
        <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
          {HOLES.map((h,i)=>{
            const s=scores[i],done=s!==""&&s!=null&&s!==undefined,active=i===holeIdx;
            const reachable=i<=maxReachable||done;
            const d=done?getDiff(Number(s),h.par):null;
            const dotColor=done?(d<=-2?"#f59e0b":d===-1?"#22c55e":d===0?t.tx2:d===1?"#f97316":"#ef4444"):(active?t.acc:t.cardB);
            return(
              <div key={i} onClick={()=>reachable&&setHoleIdx(i)}
                style={{width:active?22:15,height:active?22:15,borderRadius:"50%",background:dotColor,cursor:reachable?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",border:active?`2px solid ${t.acc}`:"none",flexShrink:0}}>
                {active&&<span style={{fontSize:8,fontWeight:900,color:done?t.bg:"#fff"}}>{h.hole}</span>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Hole card */}
      <div style={{background:t.card,border:`2px solid ${isPar3?t.acc:t.cardB}`,borderRadius:20,overflow:"hidden",marginBottom:12}}>
        <div style={{background:isPar3?(light?"rgba(45,106,45,0.15)":"rgba(56,189,248,0.1)"):(light?"rgba(45,106,45,0.06)":"rgba(255,255,255,0.03)"),borderBottom:`1px solid ${t.cardB}`}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 20px 8px"}}>
            <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:4}}>
              <button onClick={()=>holeIdx>0&&setHoleIdx(holeIdx-1)} disabled={holeIdx===0}
                style={{background:"none",border:"none",color:holeIdx>0?t.tx:t.cardB,fontSize:36,cursor:holeIdx>0?"pointer":"default",padding:"0 4px",lineHeight:1,flexShrink:0}}>❮</button>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:42,fontWeight:900,color:t.tx,lineHeight:1,textAlign:"center"}}>TROU {hole.hole}</div>
              <button onClick={()=>holeIdx<maxReachable&&setHoleIdx(holeIdx+1)} disabled={holeIdx>=maxReachable}
                style={{background:"none",border:"none",color:holeIdx<maxReachable?t.tx:t.cardB,fontSize:36,cursor:holeIdx<maxReachable?"pointer":"default",padding:"0 4px",lineHeight:1,flexShrink:0}}>❯</button>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:t.acc}}>Par {hole.par}</span>
              <span style={{fontSize:12,color:t.tx2}}>{hole.yards} verges</span>
              {isPar3&&<span style={{fontSize:12,color:t.acc,fontWeight:700,letterSpacing:1}}>📍 NP</span>}
            </div>
          </div>
        </div>

        <div style={{padding:"14px 16px"}}>
          {!canEdit?(
            <div style={{textAlign:"center",padding:"16px 0"}}>
              <div style={{fontSize:40,marginBottom:10}}>
                {hasScore?<ScoreSymbol score={Number(currentScore)} par={hole.par} size={56} light={light}/>:<span style={{color:t.tx2}}>—</span>}
              </div>
              {(()=>{
                const ranked=[...teams].map(tm=>({...tm,...getStats(tm.scores||[])})).filter(tm=>tm.played>0).sort((a,b)=>a.diff-b.diff);
                const myRank=ranked.findIndex(tm=>tm.id===team.id);
                const s=getStats(scores);
                if(myRank===-1||!s.played)return<div style={{fontSize:12,color:t.tx2,letterSpacing:1}}>Aucun score encore</div>;
                const rank=myRank+1, diff=ranked[myRank].diff;
                const rc=rank===1?"#f59e0b":rank===2?"#94a3b8":rank===3?"#b87333":t.tx2;
                return(
                  <div style={{display:"inline-flex",alignItems:"center",gap:12,background:t.cardH,border:`2px solid ${rc}`,borderRadius:14,padding:"10px 20px"}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:36,fontWeight:900,color:rc,lineHeight:1}}>#{rank}</div>
                    <div>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,color:diff<0?"#22c55e":diff>0?"#f97316":t.tx2,lineHeight:1}}>{fmtScore(diff)}</div>
                      <div style={{fontSize:10,color:t.tx2,letterSpacing:1}}>{s.played}/18 trous</div>
                    </div>
                  </div>
                );
              })()}
              {!hasScore&&<div style={{fontSize:13,color:t.tx2,marginTop:8}}>Ce trou pas encore saisi</div>}
            </div>
          ):pickMode?(
            <div>
              <p style={{color:t.tx2,fontSize:12,letterSpacing:2,marginBottom:10}}>SCORE INHABITUEL</p>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <input type="number" min="1" max="20" value={customVal} onChange={e=>setCustomVal(e.target.value)} placeholder="Ex: 9" autoFocus
                  style={{flex:1,padding:"14px",fontSize:28,fontWeight:900,textAlign:"center",background:t.inp,border:`2px solid ${t.acc}`,borderRadius:12,color:t.tx,outline:"none",fontFamily:"'Barlow Condensed',sans-serif"}}/>
                <button onClick={handleCustomConfirm} style={{padding:"14px 20px",background:t.btn,border:"none",borderRadius:12,color:"#fff",cursor:"pointer",fontSize:16,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif"}}>OK</button>
                <button onClick={()=>{setPickMode(false);setCustomVal("");}} style={{padding:"14px",background:"none",border:`1px solid ${t.cardB}`,borderRadius:12,color:t.tx2,cursor:"pointer",fontSize:14}}>✕</button>
              </div>
            </div>
          ):(
            <div>
              <ScoreRoulette par={hole.par} value={displayScore} onChange={setPicked} light={light} t={t}/>
              <button onClick={handleConfirm} disabled={displayScore===null}
                style={{width:"100%",padding:"13px",background:displayScore!==null?t.btn:"transparent",border:displayScore!==null?"none":`1px solid ${t.cardB}`,borderRadius:14,color:displayScore!==null?"#fff":t.tx2,cursor:displayScore!==null?"pointer":"default",fontSize:17,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2}}>
                {hasScore&&picked===null?"MODIFIER ✓":`CONFIRMER ${displayScore!==null?`(${displayScore} coups)`:""}`}
              </button>
            </div>
          )}
        </div>

        {isPar3&&(
          <div style={{borderTop:`1px solid ${t.cardB}`,padding:"16px 20px",background:light?"rgba(45,106,45,0.03)":"rgba(56,189,248,0.02)"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14}}>
              <span style={{fontSize:16}}>📍</span>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:900,color:t.acc,letterSpacing:2}}>NEAREST PIN — {NP_PRIZE}$</span>
            </div>
            <NearestPinClaim npEntry={npEntry} holeNum={hole.hole} myTeam={teams.find(tm=>(tm.members||[]).includes(userName))||null} isCapitaine={canEdit} isCurrentHole={holeIdx===HOLES.findIndex(h=>h.hole===hole.hole)} onClaim={onUpdateNP} light={light}/>
          </div>
        )}
      </div>
      <MiniScorecard scores={scores} light={light} currentHole={holeIdx}/>
    </div>
  );
}

// ─── LEADERBOARD ─────────────────────────────────────────────────────────────
function Leaderboard({teams,nearestPin,light,onViewScores}){
  const t=T(light);
  const ranked=[...teams].map(tm=>({...tm,...getStats(tm.scores||[])})).sort((a,b)=>{
    if(!a.played&&!b.played)return 0;if(!a.played)return 1;if(!b.played)return -1;return a.diff-b.diff;
  });
  const npWinnings={};
  PAR3S.forEach(h=>{const e=nearestPin?.[h.hole];if(e?.teamName){const k=e.winner||e.teamName;npWinnings[k]=(npWinnings[k]||0)+NP_PRIZE;}});
  return(
    <div>
      {!ranked.length&&<div style={{textAlign:"center",padding:"40px 20px",color:t.tx2}}><div style={{fontSize:48}}>⛳</div><p style={{fontSize:14,letterSpacing:2,marginTop:12}}>AUCUNE ÉQUIPE POUR L'INSTANT</p></div>}
      {ranked.map((team,idx)=>{
        const currentHole=HOLES[Math.min(getCurrentHoleIdx(team.scores||[]),17)];
        return(
          <div key={team.id} style={{padding:"14px 16px",marginBottom:10,background:idx===0&&team.played>0?t.cardH:t.card,border:`1px solid ${idx===0&&team.played>0?t.cardHB:t.cardB}`,borderRadius:14}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,minWidth:28,textAlign:"center",color:idx===0&&team.played>0?t.acc:t.tx2}}>{idx+1}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:900,fontSize:18,color:t.tx,letterSpacing:1}}>{team.name}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>
                  {(team.members||[]).map(m=>(
                    <span key={m} style={{padding:"2px 8px",background:t.cardH,borderRadius:20,fontSize:11,color:t.acc,border:`1px solid ${t.cardHB}`,display:"flex",alignItems:"center",gap:3}}>
                      {team.creator===m&&<span style={{fontSize:10}}>👑</span>}{m}
                    </span>
                  ))}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:30,fontWeight:900,color:team.diff<0?"#22c55e":team.diff>0?"#f97316":t.tx2}}>{team.played>0?fmtScore(team.diff):"—"}</div>
                <div style={{fontSize:11,color:t.acc,fontWeight:700,letterSpacing:1}}>{team.played===18?"✅ TERMINÉ":`▶ T${currentHole.hole} · ${team.played}/18`}</div>
              </div>
            </div>
            <button onClick={()=>onViewScores(team)} style={{width:"100%",padding:"7px",background:"none",border:`1px solid ${t.cardB}`,borderRadius:8,color:t.tx2,cursor:"pointer",fontSize:12,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>VOIR SCORECARD →</button>
          </div>
        );
      })}
      <div style={{marginTop:20,background:t.card,border:`1px solid ${t.cardB}`,borderRadius:14,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${t.cardB}`,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:18}}>📍</span>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:900,color:t.acc,letterSpacing:2}}>NEAREST PIN</span>
          <span style={{fontSize:12,color:t.tx2,marginLeft:"auto"}}>{NP_PRIZE}$ / trou</span>
        </div>
        {PAR3S.map(h=>{
          const e=nearestPin?.[h.hole];
          return(
            <div key={h.hole} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:`1px solid ${t.sep}`}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:t.acc,minWidth:64}}>Trou #{h.hole}</span>
                <span style={{fontSize:11,color:t.tx2}}>Par 3 · {h.yards}y</span>
              </div>
              {e?.teamName?<div style={{textAlign:"right"}}><div style={{fontWeight:700,color:t.tx,fontSize:14}}>👑 {e.winner||e.teamName}</div>{e.winner&&<div style={{fontSize:11,color:t.tx2}}>{e.teamName}</div>}</div>:<span style={{fontSize:12,color:t.tx2,fontStyle:"italic"}}>À venir...</span>}
            </div>
          );
        })}
        {Object.keys(npWinnings).length>0&&(
          <div style={{padding:"12px 16px",background:light?"rgba(45,106,45,0.05)":"rgba(251,191,36,0.04)"}}>
            <p style={{color:t.acc,fontSize:11,letterSpacing:2,marginBottom:8}}>💰 GAINS</p>
            {Object.entries(npWinnings).sort((a,b)=>b[1]-a[1]).map(([p,a])=>(
              <div key={p} style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{color:t.tx,fontSize:14}}>🏌️ {p}</span>
                <span style={{color:"#fbbf24",fontWeight:900,fontSize:16,fontFamily:"'Barlow Condensed',sans-serif"}}>{a}$</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

      </div>

  );
}

// ─── PROFILE MENU ────────────────────────────────────────────────────────────
function ProfileMenu({userName,myTeam,nearestPin,t,onWithdraw}){
  const [open,setOpen]=useState(false);
  const [step,setStep]=useState(0); // 0=main 1=transfer 2=confirm
  const [newCap,setNewCap]=useState("");
  const menuRef=useRef(null);

  useEffect(()=>{
    function close(e){if(menuRef.current&&!menuRef.current.contains(e.target)){setOpen(false);setStep(0);setNewCap("");}}
    document.addEventListener("mousedown",close);
    return()=>document.removeEventListener("mousedown",close);
  },[]);

  const hasClaim=Object.values(nearestPin||{}).some(e=>(e?.history||[]).some(h=>h.teamId===myTeam?.id));
  const isCap=myTeam?.creator===userName;
  const others=(myTeam?.members||[]).filter(m=>m!==userName);
  const aloneInTeam=isCap&&others.length===0;

  function handleRetire(){
    if(hasClaim)return;
    if(isCap&&!aloneInTeam){setStep(1);return;}
    setStep(2);
  }

  return(
    <div ref={menuRef} style={{position:"relative"}}>
      <button onClick={()=>{setOpen(o=>!o);if(open){setStep(0);setNewCap("");}}}
        style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:8,padding:"2px 0"}}>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:12,color:t.tx,fontWeight:700,lineHeight:1.2,whiteSpace:"nowrap"}}>{userName}</div>
          {myTeam&&<div style={{fontSize:10,color:t.acc,lineHeight:1.2,whiteSpace:"nowrap"}}>{myTeam.name}</div>}
        </div>
        <div style={{width:32,height:32,borderRadius:"50%",background:`linear-gradient(135deg,${t.acc},${t.acc}88)`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 0 0 2px ${t.cardB}`}}>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:900,color:t.bg||"#0a1628"}}>
            {userName.charAt(0).toUpperCase()}
          </span>
        </div>
      </button>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,background:t.hdr,border:`1px solid ${t.cardB}`,borderRadius:12,padding:8,minWidth:200,zIndex:200,boxShadow:"0 8px 24px rgba(0,0,0,0.3)"}}>
          <div style={{padding:"6px 10px 10px",borderBottom:`1px solid ${t.cardB}`,marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:700,color:t.tx}}>{userName}</div>
            <div style={{fontSize:11,color:t.tx2}}>{myTeam?`${myTeam.name}${isCap?" · Capitaine":""}` :"Sans équipe"}</div>
          </div>
          {hasClaim&&step===0&&(
            <div style={{padding:"6px 10px",marginBottom:6,background:"rgba(245,158,11,0.08)",borderRadius:8,border:"1px solid rgba(245,158,11,0.2)"}}>
              <div style={{fontSize:10,color:"#f59e0b",letterSpacing:1}}>📍 Nearest pin actif à ton nom</div>
              <div style={{fontSize:10,color:t.tx2,marginTop:1}}>Retrait impossible</div>
            </div>
          )}
          {step===1&&(
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:t.tx2,marginBottom:8}}>Choisis un nouveau capitaine :</div>
              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
                {others.map(m=>(
                  <button key={m} onClick={()=>setNewCap(m)}
                    style={{padding:"8px 12px",background:newCap===m?t.cardHB:t.cardH,border:`1px solid ${newCap===m?t.acc:t.cardB}`,borderRadius:8,color:t.tx,cursor:"pointer",fontSize:13,fontWeight:newCap===m?700:400,textAlign:"left",fontFamily:"'Barlow Condensed',sans-serif"}}>
                    {newCap===m?"✓ ":""}{m}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>newCap&&setStep(2)} disabled={!newCap}
                  style={{flex:1,padding:"8px",background:newCap?t.btn:"transparent",border:`1px solid ${newCap?t.acc:t.cardB}`,borderRadius:8,color:newCap?"#fff":t.tx2,cursor:newCap?"pointer":"default",fontSize:12,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>
                  CONTINUER →
                </button>
                <button onClick={()=>setStep(0)} style={{padding:"8px 10px",background:"none",border:`1px solid ${t.cardB}`,borderRadius:8,color:t.tx2,cursor:"pointer",fontSize:12}}>✕</button>
              </div>
            </div>
          )}
          {step===2&&(
            <div style={{marginBottom:8}}>
              <div style={{fontSize:12,color:t.tx,marginBottom:10,lineHeight:1.5}}>
                {newCap?<span>Transférer le capitainat à <strong>{newCap}</strong> et te retirer?</span>
                  :aloneInTeam?<span>Tu es seul dans l'équipe. Elle sera supprimée.</span>
                  :<span>Te retirer du tournoi?</span>}
                <div style={{fontSize:10,color:"#f87171",marginTop:4}}>Action irréversible.</div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setOpen(false);setStep(0);onWithdraw(newCap||null);}}
                  style={{flex:1,padding:"8px",background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:8,color:"#f87171",cursor:"pointer",fontSize:12,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>
                  CONFIRMER
                </button>
                <button onClick={()=>setStep(0)} style={{padding:"8px 10px",background:"none",border:`1px solid ${t.cardB}`,borderRadius:8,color:t.tx2,cursor:"pointer",fontSize:12}}>ANNULER</button>
              </div>
            </div>
          )}
          {step===0&&(
            <button onClick={handleRetire} disabled={hasClaim}
              style={{width:"100%",padding:"9px 10px",background:hasClaim?"transparent":"rgba(239,68,68,0.1)",border:`1px solid ${hasClaim?"transparent":"rgba(239,68,68,0.3)"}`,borderRadius:8,color:hasClaim?t.tx2:"#f87171",cursor:hasClaim?"not-allowed":"pointer",fontSize:13,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1,textAlign:"left",opacity:hasClaim?0.4:1}}>
              🚪 SE RETIRER DU TOURNOI
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App(){
  const [rawState,setRawState]=useState(null);
  const [userName,setUserName]=useState(()=>localStorage.getItem("rq-username")||"");
  const [view,setView]=useState("board");
  const [newTeamName,setNewTeamName]=useState("");
  const [chatInput,setChatInput]=useState("");
  const [connected,setConnected]=useState(false);
  const [toasts,setToasts]=useState([]);
  const [light,setLight]=useState(false);
  const [modalTeam,setModalTeam]=useState(null);
  const chatEndRef=useRef(null);
  const prevScores=useRef({});

  function addToast(type,hole,score,teamName){
    const id=genId();
    setToasts(t=>[...t,{id,type,hole,score,teamName,fading:false}]);
    setTimeout(()=>setToasts(t=>t.map(x=>x.id===id?{...x,fading:true}:x)),14500);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),15000);
  }
  function dismissToast(id){
    setToasts(t=>t.map(x=>x.id===id?{...x,fading:true}:x));
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),400);
  }

  useEffect(()=>{
    const unsub=subscribeState(data=>{
      const teams=data.teams?Object.entries(data.teams).map(([id,tm])=>({...tm,id,
        members:tm.members?(Array.isArray(tm.members)?tm.members:Object.values(tm.members)):[],
        scores:tm.scores?(Array.isArray(tm.scores)?tm.scores:Object.values(tm.scores)):Array(18).fill(""),
      })):[];
      const messages=data.messages?Object.entries(data.messages).map(([id,m])=>({...m,id})).sort((a,b)=>a.ts-b.ts):[];
      const users=data.users?Object.entries(data.users).map(([name,u])=>({name,...u})):[];
      teams.forEach(team=>{
        const prev=prevScores.current[team.id];
        if(prev){team.scores.forEach((sc,i)=>{
          if(sc===""||sc==null||prev[i]===sc)return;
          const d=Number(sc)-HOLES[i].par;
          let type=null;
          if(d<=-2)type="eagle";else if(d===-1)type="birdie";else if(d===1)type="bogey";else if(d===2)type="double";else if(d>=3)type="pire";
          if(type)addToast(type,i+1,sc,team.name);
        });}
        prevScores.current[team.id]=[...team.scores];
      });
      const cur=localStorage.getItem("rq-username");
      if(cur&&data.users?.[cur]?.deleted){
        localStorage.removeItem("rq-username");fbRemove(`users/${cur}`);setUserName("");
        setRawState({teams,messages,nearestPin:data.nearestPin||{},users});setConnected(true);return;
      }
      setRawState({teams,messages,nearestPin:data.nearestPin||{},users});setConnected(true);
    });
    return unsub;
  },[]);

  useEffect(()=>{if(!userName)return;db.ref(`${ROOT}/users/${userName}`).get().then(snap=>{if(!snap.exists())fbSet(`users/${userName}`,{joinedAt:Date.now(),deleted:false});});},[userName]);
  useEffect(()=>{if(chatEndRef.current)chatEndRef.current.scrollIntoView({behavior:"smooth"});},[rawState?.messages?.length]);

  async function registerAndEnter(name,action,payload){
    const snap=await db.ref(`${ROOT}/users/${name}`).get();
    if(snap.exists()&&!snap.val().deleted){alert(`Le nom "${name}" est déjà utilisé! Choisis un autre nom.`);return;}
    await fbSet(`users/${name}`,{joinedAt:Date.now(),deleted:false});
    localStorage.setItem("rq-username",name);setUserName(name);
    if(action==="join"&&payload){
      if(!(payload.members||[]).includes(name))await fbSet(`teams/${payload.id}/members`,[...(payload.members||[]),name]);
      setView("scorecard");
    }else if(action==="create"&&payload){
      const id=genId();
      await fbSet(`teams/${id}`,{name:payload,creator:name,members:[name],scores:Array(18).fill(""),createdAt:Date.now()});
      setView("scorecard");
    }
  }

  if(!connected)return React.createElement(Spinner,null);
  if(!userName)return React.createElement(EntryScreen,{onEnter:registerAndEnter,teams:rawState?.teams||[]});

  const {teams=[],messages=[],nearestPin={},users=[]}=rawState||{};
  const myTeam=teams.find(tm=>(tm.members||[]).includes(userName));
  const isAdmin=userName==="Nick";
  const isCapitaine=myTeam?.creator===userName;
  const canEdit=isCapitaine||isAdmin;
  const t=T(light);

  async function createTeam(){
    if(!newTeamName.trim())return;if(myTeam)return alert("Tu es déjà dans une équipe!");
    const id=genId();await fbSet(`teams/${id}`,{name:newTeamName.trim(),creator:userName,members:[userName],scores:Array(18).fill(""),createdAt:Date.now()});
    setNewTeamName("");setView("scorecard");
  }
  async function joinTeam(teamId){
    if(myTeam)return alert("Tu es déjà dans une équipe!");
    const team=teams.find(tm=>tm.id===teamId);
    await fbSet(`teams/${teamId}/members`,[...(team.members||[]),userName]);setView("scorecard");
  }
  async function leaveTeam(){
    if(!myTeam)return;
    if(myTeam.creator===userName){if(!window.confirm("Tu es le créateur. L\'équipe sera supprimée!"))return;await fbRemove(`teams/${myTeam.id}`);}
    else await fbSet(`teams/${myTeam.id}/members`,myTeam.members.filter(m=>m!==userName));
    setView("board");
  }
  async function updateScore(scores){if(myTeam)await fbSet(`teams/${myTeam.id}/scores`,scores);}
  async function claimNP(holeNum,winner,teamId,teamName){
    if(winner===null&&teamId===null){await fbRemove(`nearestPin/${holeNum}`);return;}
    const existing=rawState?.nearestPin?.[holeNum];
    const history=[...(existing?.history||[]),{teamId,teamName,winner,claimedAt:Date.now()}];
    await fbSet(`nearestPin/${holeNum}`,{teamId,teamName,winner,claimedAt:Date.now(),history});
  }
  async function sendMessage(){
    if(!chatInput.trim())return;
    await fbPush("messages",{author:userName,team:myTeam?.name||"Spectateur",text:chatInput.trim(),ts:Date.now()});
    setChatInput("");
  }
  async function deleteMember(team,member){
    if(team.creator===member)await fbRemove(`teams/${team.id}`);
    else await fbSet(`teams/${team.id}/members`,(team.members||[]).filter(m=>m!==member));
    await fbSet(`users/${member}/deleted`,true);
  }
  async function withdraw(newCap){
    if(myTeam){
      if(newCap){
        await fbSet(`teams/${myTeam.id}/creator`,newCap);
        await fbSet(`teams/${myTeam.id}/members`,myTeam.members.filter(m=>m!==userName));
      } else {
        await fbRemove(`teams/${myTeam.id}`);
      }
    }
    await fbRemove(`users/${userName}`);
    localStorage.removeItem("rq-username");
    setUserName("");
  }
  async function resetGame(){
    await fbRemove("nearestPin");await fbRemove("messages");
    for(const tm of teams)await fbSet(`teams/${tm.id}/scores`,Array(18).fill(""));
  }
  async function resetAll(){await db.ref(ROOT).remove();localStorage.removeItem("rq-username");setUserName("");}

  const navItems=[
    {id:"board",label:"Tableau",emoji:"🏆"},
    {id:"teams",label:"Équipes",emoji:"⛳"},
    {id:"scorecard",label:myTeam?"Ma carte":"Scores",emoji:"📋"},
    {id:"chat",label:"Trash",emoji:"🦈"},
    {id:"theme",label:light?"Sombre":"Clair",emoji:light?"🌙":"☀️"},
    ...(isAdmin?[{id:"admin",label:"Admin",emoji:"🔐"}]:[]),
  ];
  const scorecardTeam=myTeam;

  return(
    <div style={{minHeight:"100vh",background:t.bg,color:t.tx,fontFamily:"'Barlow',sans-serif",paddingBottom:80,transition:"background 0.3s"}}>
      <ToastContainer toasts={toasts} onDismiss={dismissToast}/>
      {modalTeam&&<ScorecardModal team={modalTeam} onClose={()=>setModalTeam(null)} light={light} nearestPin={nearestPin}/>}
      <div style={{background:t.hdr,backdropFilter:"blur(12px)",borderBottom:`1px solid ${t.hdrB}`,padding:"8px 16px",position:"sticky",top:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:24}}>🦈</span>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:900,letterSpacing:2,lineHeight:1,color:t.acc}}>REQUINS OPEN</div>
            <div style={{fontSize:9,color:t.tx2,letterSpacing:2,marginTop:1}}>v2.8</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:connected?"#22c55e":"#ef4444",flexShrink:0}}/>
          <ProfileMenu userName={userName} myTeam={myTeam} nearestPin={nearestPin} t={t} onWithdraw={withdraw}/>
        </div>
      </div>

      <div style={{maxWidth:600,margin:"0 auto",padding:"12px 16px",animation:"fadeIn 0.3s ease"}}>
        {view==="admin"&&isAdmin&&<AdminPanel teams={teams} users={users} onResetGame={resetGame} onResetAll={resetAll} onDeleteMember={deleteMember} light={light}/>}
        {view==="board"&&(
          <div>
            <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,letterSpacing:2,color:t.tx,marginBottom:4}}>CLASSEMENT 🏆</h2>
            <p style={{color:t.tx2,fontSize:12,letterSpacing:2,marginBottom:20}}>Lac Mégantic · Par {TOTAL_PAR} · Temps réel</p>
            <Leaderboard teams={teams} nearestPin={nearestPin} light={light} onViewScores={setModalTeam}/>
          </div>
        )}
        {view==="teams"&&(
          <div>
            <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,letterSpacing:2,color:t.tx,marginBottom:20}}>ÉQUIPES ⛳</h2>
            {!myTeam&&(
              <div style={{background:t.cardH,border:`1px solid ${t.cardHB}`,borderRadius:14,padding:18,marginBottom:20}}>
                <p style={{color:t.acc,fontSize:12,letterSpacing:2,marginBottom:10}}>CRÉER UNE ÉQUIPE</p>
                <div style={{display:"flex",gap:8}}>
                  <input value={newTeamName} onChange={e=>setNewTeamName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createTeam()} placeholder="Nom de ton équipe..."
                    style={{flex:1,padding:"12px 14px",fontSize:16,fontWeight:700,background:t.inp,border:`1px solid ${t.inpB}`,borderRadius:8,color:t.tx,outline:"none",fontFamily:"'Barlow Condensed',sans-serif"}}/>
                  <button onClick={createTeam} style={{padding:"12px 18px",background:t.btn,border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:16,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif"}}>CRÉER</button>
                </div>
              </div>
            )}
            {myTeam&&(
              <div style={{background:t.cardH,border:`1px solid ${t.cardHB}`,borderRadius:14,padding:18,marginBottom:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <p style={{color:t.acc,fontSize:12,letterSpacing:2,marginBottom:4}}>TON ÉQUIPE{isCapitaine?" · ✏️ CAPITAINE":""}</p>
                    <p style={{color:t.tx,fontSize:20,fontWeight:700}}>🦈 {myTeam.name}</p>
                  </div>
                  <button onClick={leaveTeam} style={{padding:"8px 14px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:8,color:"#dc2626",cursor:"pointer",fontSize:12,letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"}}>QUITTER</button>
                </div>
              </div>
            )}
            {!teams.length&&<div style={{textAlign:"center",padding:"40px 0",color:t.tx2}}><div style={{fontSize:48,marginBottom:12}}>🏌️</div><p style={{letterSpacing:2,fontSize:13}}>Aucune équipe. Sois le premier!</p></div>}
            {teams.map(team=>{
              const isMine=team.id===myTeam?.id,stats=getStats(team.scores||[]);
              return(
                <div key={team.id} style={{background:isMine?t.cardH:t.card,border:`1px solid ${isMine?t.cardHB:t.cardB}`,borderRadius:14,padding:16,marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div><div style={{fontSize:18,fontWeight:700,color:t.tx}}>🦈 {team.name}</div><div style={{fontSize:11,color:t.tx2,marginTop:2}}>Créé par {team.creator}</div></div>
                    <div style={{textAlign:"right"}}><div style={{fontSize:22,fontWeight:900,color:stats.diff<0?"#22c55e":stats.diff>0?"#f97316":t.tx2}}>{stats.played>0?fmtScore(stats.diff):"—"}</div><div style={{fontSize:10,color:t.tx2}}>{stats.played}/18 trous</div></div>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                    {(team.members||[]).map(m=><span key={m} style={{padding:"3px 10px",background:t.cardH,borderRadius:20,fontSize:12,color:t.acc,border:`1px solid ${t.cardHB}`}}>{m}</span>)}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    {!myTeam&&<button onClick={()=>joinTeam(team.id)} style={{padding:"8px 16px",background:t.btn,border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>JOINDRE</button>}
                    <button onClick={()=>setModalTeam(team)} style={{padding:"8px 16px",background:"none",border:`1px solid ${t.cardB}`,borderRadius:8,color:t.tx2,cursor:"pointer",fontSize:13,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>VOIR SCORES</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        {view==="scorecard"&&(
          <div>
            {!scorecardTeam?(
              <div style={{textAlign:"center",padding:"60px 0"}}>
                <div style={{fontSize:48}}>📋</div>
                <p style={{color:t.tx2,marginTop:16,letterSpacing:2,fontSize:13}}>JOINS UNE ÉQUIPE POUR ACCÉDER À LA CARTE</p>
                <button onClick={()=>setView("teams")} style={{marginTop:16,padding:"12px 24px",background:t.btn,border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2}}>VOIR LES ÉQUIPES</button>
              </div>
            ):(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900,color:t.tx}}>🦈 {scorecardTeam.name}</h2>
                  {(()=>{
                    const ranked=[...teams].map(tm=>({...tm,...getStats(tm.scores||[])})).sort((a,b)=>{if(!a.played&&!b.played)return 0;if(!a.played)return 1;if(!b.played)return -1;return a.diff-b.diff;});
                    const myIdx=ranked.findIndex(tm=>tm.id===scorecardTeam.id);
                    const total=teams.length;
                    const myStats=getStats(scorecardTeam.scores||[]);
                    if(myIdx===-1)return<span style={{fontSize:11,color:t.tx2,letterSpacing:1}}>{canEdit?"✏️ CAPITAINE":"👀 MEMBRE"}</span>;
                    const rank=myIdx+1;
                    const cumulVal=(scorecardTeam.scores||[]).reduce((acc,s,i)=>{
                      if(s===""||s==null||s===undefined)return acc;
                      return acc+(Number(s)-HOLES[i].par);
                    },0);
                    const cumulPlayed=(scorecardTeam.scores||[]).filter(s=>s!==""&&s!=null&&s!==undefined).length;
                    const scoreCol=cumulVal<0?"#22c55e":cumulVal>0?"#f97316":t.tx2;
                    return(
                      <div style={{display:"flex",alignItems:"center",gap:10,background:t.cardH,border:`1px solid ${t.cardB}`,borderRadius:12,padding:"6px 12px"}}>
                        {cumulPlayed>0&&(
                          <div style={{textAlign:"center",borderRight:`1px solid ${t.cardB}`,paddingRight:10}}>
                            <div style={{fontSize:9,color:t.tx2,letterSpacing:1,marginBottom:1}}>SCORE</div>
                            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,color:scoreCol,lineHeight:1}}>{fmtScore(cumulVal)}</div>
                          </div>
                        )}
                        <div style={{textAlign:"center"}}>
                          <div style={{fontSize:9,color:t.tx2,letterSpacing:1,marginBottom:1}}>RANG</div>
                          <div style={{fontFamily:"'Barlow Condensed',sans-serif",lineHeight:1}}>
                            <span style={{fontSize:22,fontWeight:900,color:t.acc}}>{rank}</span>
                            <span style={{fontSize:12,fontWeight:700,color:t.tx2}}>/{total}</span>
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
                <HoleScorecard team={scorecardTeam} canEdit={canEdit} onUpdateScore={updateScore} onUpdateNP={claimNP} nearestPin={nearestPin} light={light} teams={teams} userName={userName}/>
              </div>
            )}
          </div>
        )}
        {view==="chat"&&(
          <div>
            <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,letterSpacing:2,color:t.tx,marginBottom:4}}>TRASH TALK 🦈</h2>
            <p style={{color:t.tx2,fontSize:12,letterSpacing:2,marginBottom:20}}>Chippe les autres équipes ici · Live</p>
            <div style={{minHeight:300,maxHeight:480,overflowY:"auto",padding:"16px",background:t.card,borderRadius:14,marginBottom:16,border:`1px solid ${t.cardB}`}}>
              {!messages.length&&<div style={{textAlign:"center",paddingTop:60,color:t.tx2}}><div style={{fontSize:40}}>🦈</div><p style={{marginTop:12,letterSpacing:2,fontSize:12}}>AUCUN TRASH TALK POUR L'INSTANT</p></div>}
              {messages.map(msg=><ChatBubble key={msg.id} msg={msg} isMe={msg.author===userName} light={light}/>)}
              <div ref={chatEndRef}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMessage()} placeholder="Chippe une équipe... 🦈"
                style={{flex:1,padding:"12px 16px",fontSize:15,background:t.inp,border:`1px solid ${t.inpB}`,borderRadius:24,color:t.tx,outline:"none",fontFamily:"'Barlow',sans-serif"}}/>
              <button onClick={sendMessage} style={{padding:"12px 18px",background:t.btn,border:"none",borderRadius:24,color:"#fff",cursor:"pointer",fontSize:18}}>🦈</button>
            </div>
          </div>
        )}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:t.nav,backdropFilter:"blur(16px)",borderTop:`1px solid ${t.navB}`,display:"flex",justifyContent:"space-around",padding:"10px 0 max(10px,env(safe-area-inset-bottom))"}}>
        {navItems.map(nav=>{
          const isTheme=nav.id==="theme",active=!isTheme&&view===nav.id;
          return(
            <button key={nav.id} onClick={()=>isTheme?setLight(l=>!l):setView(nav.id)}
              style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"4px 10px",color:active?t.acc:t.tx2,transition:"color 0.2s"}}>
              <span style={{fontSize:22}}>{nav.emoji}</span>
              <span style={{fontSize:10,fontWeight:700,letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>{nav.label}</span>
              {active&&<div style={{width:4,height:4,borderRadius:"50%",background:t.acc}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
